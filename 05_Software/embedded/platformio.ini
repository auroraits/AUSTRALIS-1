[platformio]
default_envs = esp32s3_supermini_tx

[env]
framework = arduino
lib_deps =
  RadioHead

[env:esp32s3_supermini_tx]
platform = espressif32
board = esp32-s3-devkitc-1
build_src_filter = +<esp32_s3_tx_telemetry/telemetry_tx.ino>

[env:uno_rx_logger]
platform = atmelavr
board = uno
build_src_filter = +<uno_rx_logger/rx_logger.ino>
